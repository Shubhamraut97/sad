<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>LMS Django</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>

    <style type="text/css">
      body {
        font-family: 'Roboto', sans-serif;
        background-color: #f4f7fb;
        color: #5a5a5a;
        margin: 0;
        padding: 0;
      }

      .navbar {
        background-color: #5cd3b4; /* Lighter shade of blue */
      }

      .navbar a {
        color: #fff;
      }

      .signup-form {
        width: 100%;
        max-width: 600px;
        margin: 0 auto;
        padding: 40px;
        background-color: #ffffff;
        border-radius: 10px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      }

      .signup-form h2 {
        text-align: center;
        font-size: 32px;
        margin-bottom: 30px;
        color: #333;
      }

      .signup-form .form-group {
        margin-bottom: 20px;
      }

      .signup-form label {
        font-size: 14px;
        font-weight: bold;
      }

      .signup-form input,
      .signup-form select,
      .signup-form button {
        font-size: 16px;
        padding: 12px;
        border-radius: 8px;
        border: 1px solid #ddd;
        transition: all 0.3s ease;
        width: 100%;
      }

      .signup-form input:focus,
      .signup-form select:focus {
        border-color: #5cd3b4;
        box-shadow: 0 0 10px rgba(92, 211, 180, 0.5);
      }

      .signup-form button {
        background-color: #5cd3b4; /* Lighter shade of blue */
        color: #fff;
        font-weight: bold;
        border: none;
        cursor: pointer;
        transition: background-color 0.3s;
        width: 100%;
      }

      .signup-form button:hover,
      .signup-form button:focus {
        background-color: #41cba9;
      }

      .signup-form .form-control {
        border-radius: 8px;
        border: 1px solid #ddd;
        padding: 14px;
        margin-bottom: 15px;
      }

      .invalid-feedback {
        display: block;
        font-size: 12px;
        color: #e74c3c;
        margin-top: 8px;
      }

      .form-group.text-center {
        text-align: center;
      }

      .signup-form .btn-lg {
        width: 100%;
      }

      .text-center a {
        color: #2b04ff;
        text-decoration: underline;
      }

      .text-center a:hover {
        text-decoration: none;
      }

      /* Add some responsiveness */
      @media (max-width: 768px) {
        .signup-form {
          width: 90%;
          padding: 25px;
        }

        .signup-form h2 {
          font-size: 28px;
        }
      }

      /* Center the login container */
      .main-container {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #f4f7fb;
      }
    </style>
  </head>
  <body>
    {% include "library/navbar.html" %}

    <div class="main-container">
      <div class="signup-form">
        <form method="post" class="needs-validation" novalidate>
          <center><h2>Admin Login</h2></center>

          {% csrf_token %}
          {% for field in form %}
            <div class="form-group">
              <label>{{ field.label_tag }}</label>
              <div>
                {{ field }}
                {% if field.errors %}
                  <div class="invalid-feedback">{{ field.errors|striptags }}</div>
                {% endif %}
              </div>
            </div>
          {% endfor %}

          <div class="form-group">
            <button type="submit" class="btn btn-success btn-lg">Login</button>
          </div>
        </form>
      </div>
    </div>

    <script>
      // Bootstrap custom validation
      (function () {
        'use strict'
        window.addEventListener('load', function () {
          var forms = document.getElementsByClassName('needs-validation')
          Array.prototype.filter.call(forms, function (form) {
            form.addEventListener('submit', function (event) {
              if (!form.checkValidity()) {
                event.preventDefault()
                event.stopPropagation()
              }
              form.classList.add('was-validated')
            }, false)
          })
        }, false)
      })()
    </script>
  </body>
</html>
