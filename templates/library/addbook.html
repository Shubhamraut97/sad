<style>
  .form-container {
    max-width: 700px;
    margin: 80px auto;
    padding: 2rem;
    background: #f8f9fa;
    border-radius: 10px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    text-align: center;
  }

  .form-header h2 {
    font-weight: 600;
    margin-bottom: 0.5rem;
  }

  .form-header p {
    color: #6c757d;
    margin-bottom: 2rem;
  }

  .form-control {
    padding: 1.5rem 2rem;
    font-size: 1.1rem;
    min-height: 60px;
    border-radius: 8px;
    text-align: center;
  }

  textarea.form-control {
    min-height: 150px;
  }

  .input-container {
    max-width: 100%;
    margin: 0 auto;
  }

  select.form-control {
    background-size: 24px;
    background-position: right 1.5rem center;
    text-align-last: center; /* Center text in dropdown */
  }

  .form-control:focus {
    box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.2);
  }

  .form-label {
    display: block;
    font-weight: 500;
    margin-bottom: 0.5rem;
  }

  .form-label i {
    font-size: 1.3rem;
    margin-right: 0.5rem;
    color: #17a2b8;
  }

  .form-group {
    margin-bottom: 2.5rem;
  }

  .btn-submit {
    background-color: #28a745;
    color: #fff;
    font-size: 1.1rem;
    padding: 0.75rem 1rem;
    border-radius: 50px;
    transition: all 0.3s ease;
    width: 100%;
  }

  .btn-submit:hover {
    background-color: #218838;
  }

  .view-books {
    margin-top: 2rem;
  }

  .cta-link {
    font-weight: 500;
    text-decoration: none;
    color: #007bff;
    transition: color 0.2s ease;
  }

  .cta-link:hover {
    color: #0056b3;
  }

  .cta-link i {
    margin-left: 0.3rem;
  }
</style>

<div class="form-container">
  <div class="form-header">
    <h2>Enrich Our Library</h2>
    <p class="text-muted">Contribute to our growing collection of knowledge and resources</p>
  </div>

  <form method="post">
    {% csrf_token %}
    {% for field in form %}
      <div class="form-group">
        <label for="{{ field.id_for_label }}" class="form-label">
          <i class="fas fa-{% cycle 'book-open' 'pen-nib' 'user-edit' 'calendar-alt' 'barcode' %}"></i>
          {{ field.label }}
        </label>
        <div class="input-container">
          {{ field }}
        </div>
      </div>
    {% endfor %}

    <button type="submit" class="btn btn-submit">
      <i class="fas fa-plus-circle"></i>
      Add Literary Work
    </button>
  </form>

  <div class="view-books">
    <p class="mb-1">Explore existing collection</p>
    <a href="viewbook" class="cta-link">
      Browse Full Catalog
      <i class="fas fa-arrow-right"></i>
    </a>
  </div>
</div>
