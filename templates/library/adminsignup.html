<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>LMS Django</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>

    <style type="text/css">
      body {
        font-family: 'Roboto', sans-serif;
        background-color: #f4f7fb;
        color: #333;
        margin: 0;
        padding: 0;
      }

      .navbar {
        background-color: #333;
      }

      .navbar a {
        color: #fff;
      }

      .signup-form {
        width: 500px;
        margin: 0 auto;
        padding: 40px 30px;
        background: #fff;
        box-shadow: 0 2px 15px rgba(0, 0, 0, 0.1);
        border-radius: 10px;
      }

      .signup-form h2 {
        color: #333;
        text-align: center;
        margin-bottom: 30px;
        font-size: 24px;
      }

      .signup-form .form-group {
        margin-bottom: 20px;
      }

      .signup-form label {
        font-weight: normal;
        font-size: 14px;
        margin-bottom: 5px;
      }

      .signup-form input[type="text"],
      .signup-form input[type="password"] {
        border-radius: 5px;
        padding: 10px;
        border: 1px solid #ddd;
        width: 100%;
      }

      .signup-form input[type="text"]:focus,
      .signup-form input[type="password"]:focus {
        border-color: #5cd3b4;
        outline: none;
      }

      .signup-form .btn {
        font-size: 16px;
        font-weight: bold;
        background-color: #5cd3b4;
        border: none;
        width: 100%;
        padding: 12px;
        border-radius: 5px;
      }

      .signup-form .btn:hover, .signup-form .btn:focus {
        background-color: #41cba9;
        outline: none !important;
      }

      .signup-form a {
        color: #5cd3b4;
        text-decoration: none;
      }

      .signup-form a:hover {
        text-decoration: underline;
      }

      .signup-form .form-group {
        margin-bottom: 20px;
      }
    </style>
  </head>

  <body>
    {% comment %} {% include "library/navbar.html" %} {% endcomment %}
    <br>
    <br>
    <center>
      <h3 class="alert alert-success" style="margin-bottom: 0px;">Signup As Admin!</h3>
    </center>
    <div class="signup-form">
      <form method="post" class="form-horizontal">
        {% comment %} <center>
          <h2>Admin Signup</h2>
        </center> {% endcomment %}
        {% csrf_token %}
        {% for field in form %}
        <div class="form-group text-center">
          <label class="control-label col-xs-4">{{ field.label_tag }}</label>
          <div class="col-xs-8">
            {{ field }}
          </div>
        </div>
        {% endfor %}
        <div class="form-group text-center">
          <div class="col-xs-8 col-xs-offset-4">
            <button type="submit" class="btn btn-success btn-lg" style="border-radius: 5px;">Sign Up</button>
          </div>
        </div>
      </form>
      <div class="text-center">Already have an account? <a href="adminlogin">Login here</a></div>
    </div>

    {% include "library/footer.html" %}
  </body>
</html>
